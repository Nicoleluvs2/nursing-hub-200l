<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Hub | 200L</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f172a;
    --card-bg: rgba(255, 255, 255, 0.05);
    --accent: #7b1c1c;
    --glow: rgba(123, 28, 28, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Outfit', sans-serif; 
    background: var(--bg-dark); 
    color: white; 
    overflow-x: hidden;
    /* Animated Background */
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #7b1c1c, #0f172a);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container { max-width: 1000px; margin: 80px auto; padding: 20px; }

  header { text-align: center; margin-bottom: 60px; }
  header h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: -1px; }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
  }

  .course-card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    text-decoration: none;
    color: white;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
  }

  .course-card:hover {
    transform: translateY(-15px) scale(1.05);
    box-shadow: 0 20px 40px var(--glow);
    border-color: var(--accent);
  }

  .course-code { font-size: 0.7rem; letter-spacing: 2px; color: #94a3b8; margin-bottom: 10px; }
  .course-title { font-size: 1.5rem; margin-bottom: 15px; }

  /* Smooth scroll-reveal effect class (JS will add this) */
  .reveal {
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.8s ease-out;
  }
  .reveal.active {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Caleb Nursing</h1>
    <p>200-Level Study Hub</p>
  </header>
  
  <div class="course-grid">
    <a href="pathoma.html" class="course-card reveal">
      <div class="course-code">PATH</div>
      <h3 class="course-title">Pathophysiology</h3>
    </a>
    <a href="neuroanatomy.html" class="course-card reveal">
      <div class="course-code">ANAT</div>
      <h3 class="course-title">Neuroanatomy</h3>
    </a>
    <a href="thorax-abdominopelvic-anatomy-notes.html" class="course-card reveal">
      <div class="course-code">ANAT</div>
      <h3 class="course-title">Thorax & Pelvis</h3>
    </a>
  </div>
</div>

<script>
  // Reveal cards on scroll
  function reveal() {
    var reveals = document.querySelectorAll(".reveal");
    for (var i = 0; i < reveals.length; i++) {
      var windowHeight = window.innerHeight;
      var elementTop = reveals[i].getBoundingClientRect().top;
      var elementVisible = 150;
      if (elementTop < windowHeight - elementVisible) {
        reveals[i].classList.add("active");
      }
    }
  }
  window.addEventListener("scroll", reveal);
  // Trigger on load
  reveal();
</script>
</body>
</html>
